# File: prometheus/rules/sre_alerts.yaml
# Description: Prometheus Alerting Rules for Application and Infrastructure outages.
# Project: Kubernetes Monitoring Stack

groups:
- name: application_alerts
  rules:
  - alert: HighErrorRate
    expr: (sum(rate(api_errors_total[5m])) / sum(rate(api_requests_total[5m]))) * 100 > 5
    for: 2m
    labels:
      severity: critical
      team: backend
    annotations:
      summary: "High Error Rate on {{ $labels.instance }}"
      description: "Error rate is above 5% for more than 2 minutes. Current value: {{ $value | printf \"%.2f\" }}%"

  - alert: HighLatencyP95
    expr: histogram_quantile(0.95, sum(rate(api_request_duration_seconds_bucket[5m])) by (le)) > 0.5
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High Latency on {{ $labels.instance }}"
      description: "P95 latency is above 500ms for more than 5 minutes."

- name: infrastructure_alerts
  rules:
  - alert: PodCrashLooping
    expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 > 5
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Pod {{ $labels.pod }} is crashlooping"
      description: "Pod {{ $labels.pod }} has restarted more than 5 times in the last minute."
